function ensureCoordinates(dmc) {
  // Générer les coordonnées à partir de TOUTES les destinations (primary + proposées)
  const seen = new Set();
  const computed = [];
  const allRaw = [...(dmc.primary_destinations || []), ...(dmc.destinations || [])];
  allRaw.forEach(dest => {
    const key = dest.toLowerCase().trim();
    if (seen.has(key)) return;
    seen.add(key);
    const coord = GEO[key];
    if (coord) {
      computed.push({ lat: coord[0], lng: coord[1], destination: dest });
    }
  });
  dmc.coordinates = computed;
}

// CHARGEMENT DEPUIS FIRESTORE
// =====================================================================
async function loadData() {
  try {
    const snap = await db.collection('dmc').get();
    allDMC = snap.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(d => d.status !== 'draft');
    allDMC.forEach(ensureCoordinates);
    filteredDMC = [...allDMC].sort((a, b) => (a.title || '').localeCompare(b.title || '', 'fr'));
    buildFilters();
    renderList();
    renderMarkers();
    updateCount();
    initEmbedMap();
    loadBanner();
  } catch(e) {
    console.error('Erreur chargement données DMC:', e);
    document.getElementById('dmcList').innerHTML = '<div class="no-results"><p>Erreur de chargement des données.</p></div>';
  }
}

async function loadBanner() {
  try {
    const snap = await db.collection('banners').where('active', '==', true).get();
    if (snap.empty) return;
    const now = new Date();
    const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
    const banner = snap.docs.map(d => d.data()).find(b => {
      if (b.date_start && b.date_start > today) return false;
      if (b.date_end && b.date_end < today) return false;
      return true;
    });
    if (!banner) return;
    // Detect mobile: use screen.width (reliable even inside iframes) with window.innerWidth as fallback
    var viewportWidth = screen.width || window.innerWidth;
    try { if (window.parent && window.parent.innerWidth) viewportWidth = window.parent.innerWidth; } catch(e) {}
    const isMobile = viewportWidth < 768;
    const html = isMobile ? banner.html_mobile : banner.html_desktop;
    if (!html || !html.trim()) return;
    const slot = document.getElementById('bannerSlot');
    const content = document.getElementById('bannerContent');
    content.innerHTML = html;
    // Force responsive images that scale proportionally
    content.querySelectorAll('img').forEach(img => {
      img.style.maxWidth = '100%';
      img.style.width = '100%';
      img.style.height = 'auto';
      img.style.display = 'block';
    });
    // Hide tracking pixels (1x1)
    content.querySelectorAll('img[width="1"], img[height="1"]').forEach(img => {
      img.style.display = 'none';
    });
    // Force max-width on injected wrapper divs
    content.querySelectorAll('div').forEach(div => {
      div.style.maxWidth = '100%';
    });
    slot.style.display = 'block';
    // Tell Leaflet to recalculate after banner appears
    setTimeout(() => { if (mainMap) mainMap.invalidateSize(); }, 200);
  } catch(e) { console.error('Erreur chargement bannière:', e); }
}

function closeBanner() {
  document.getElementById('bannerSlot').style.display = 'none';
  // Tell Leaflet to recalculate after banner disappears
  setTimeout(() => { if (mainMap) mainMap.invalidateSize(); }, 100);
}

function buildFilters() {
  const continents = new Set();
  const countryMap = new Map(); // key=normalized, value=display name (with accents)
  const foundTags = { clientele: new Map(), prestations: new Map(), activites: new Map() };

  allDMC.forEach(dmc => {
    (dmc.continents || []).forEach(c => continents.add(c));
    [...(dmc.destinations || []), ...(dmc.primary_destinations || [])].forEach(d => {
      let clean = cleanDest(d);
      if (clean) {
        let key = normalizeForCompare(clean);
        if (!countryMap.has(key) || clean.length > countryMap.get(key).length) {
          countryMap.set(key, clean);
        }
      }
    });
    ['clientele', 'prestations', 'activites'].forEach(cat => {
      (dmc.tags[cat] || []).forEach(t => foundTags[cat].set(t.id, t.label));
    });
  });

  // Selects
  const selC = document.getElementById('filterContinent');
  [...continents].sort().forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; selC.appendChild(o); });
  const selP = document.getElementById('filterCountry');
  const countryList = [...countryMap.values()].sort((a,b) => a.localeCompare(b,'fr'));
  countryList.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; selP.appendChild(o); });

  // Clientèle (pas de sous-groupes, assez peu)
  buildChipsFlat('chipsClientele', foundTags.clientele);

  // Prestations groupées
  buildGroupedChips('groupsPrestations', PRESTATION_GROUPS, foundTags.prestations);

  // Activités groupées
  buildGroupedChips('groupsActivites', ACTIVITE_GROUPS, foundTags.activites);
}

function buildChipsFlat(containerId, tagMap) {
  const container = document.getElementById(containerId);
  [...tagMap.entries()].sort((a,b) => a[1].localeCompare(b[1],'fr')).forEach(([id, label]) => {
    const chip = document.createElement('div');
    chip.className = 'filter-chip';
    chip.dataset.tagId = id;
    chip.textContent = label;
    chip.onclick = () => { chip.classList.toggle('active'); applyFilters(); };
    container.appendChild(chip);
  });
}

function buildGroupedChips(containerId, groupDef, tagMap) {
  const container = document.getElementById(containerId);
  Object.entries(groupDef).forEach(([groupName, tagIds]) => {
    // Filtrer : ne garder que les tags qui existent dans les données, dédupliquer par label
    const seenLabels = new Set();
    const existing = [];
    tagIds.forEach(id => {
      if (tagMap.has(id)) {
        const label = tagMap.get(id);
        if (!seenLabels.has(label.toLowerCase())) {
          seenLabels.add(label.toLowerCase());
          existing.push(id);
        }
      }
    });
    if (existing.length === 0) return;

    const group = document.createElement('div');
    group.className = 'filter-group';

    const header = document.createElement('div');
    header.className = 'filter-group-header';
    header.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 6 15 12 9 18"/></svg>
      <span>${groupName}</span>
      <span class="group-count">${existing.length}</span>`;
    header.onclick = () => {
      header.classList.toggle('open');
      body.classList.toggle('open');
    };

    const body = document.createElement('div');
    body.className = 'filter-group-body';
    const chips = document.createElement('div');
    chips.className = 'filter-chips';

    existing.forEach(id => {
      const label = tagMap.get(id);
      const chip = document.createElement('div');
      chip.className = 'filter-chip';
      chip.dataset.tagId = id;
      chip.textContent = label;
      chip.onclick = (e) => { e.stopPropagation(); chip.classList.toggle('active'); applyFilters(); };
      chips.appendChild(chip);
    });

    body.appendChild(chips);
    group.appendChild(header);
    group.appendChild(body);
    container.appendChild(group);
  });
}

// =====================================================================
// APPLICATION DES FILTRES
// =====================================================================
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const continent = document.getElementById('filterContinent').value;
  const country = document.getElementById('filterCountry').value;

  const activeChips = [];
  document.querySelectorAll('.filter-chip.active').forEach(c => activeChips.push(c.dataset.tagId));

  filteredDMC = allDMC.filter(dmc => {
    if (search) {
      const hay = [dmc.title, dmc.description, ...(dmc.destinations||[]), ...(dmc.primary_destinations||[]), ...(dmc.continents||[])].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    if (continent && !(dmc.continents||[]).includes(continent)) return false;
    if (country) {
      const countryNorm = normalizeForCompare(country);
      const dmcDests = [...(dmc.destinations||[]), ...(dmc.primary_destinations||[])].map(d => normalizeForCompare(d));
      if (!dmcDests.includes(countryNorm)) return false;
    }

    if (activeChips.length > 0) {
      const allDmcTags = [
        ...(dmc.tags.clientele||[]).map(t=>t.id),
        ...(dmc.tags.prestations||[]).map(t=>t.id),
        ...(dmc.tags.activites||[]).map(t=>t.id)
      ];
      if (!activeChips.every(id => allDmcTags.includes(id))) return false;
    }
    return true;
  });

  filteredDMC.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'fr'));

  renderList();
  renderMarkers();
  updateCount();
  updateActiveFiltersCount();

  // Auto-zoom on continent if search matches a continent name
  if (search && mainMap) {
    const CONTINENT_BOUNDS = {
      'afrique': [[-35, -20], [37, 52]],
      'ameriques': [[-56, -130], [72, -30]],
      'amériques': [[-56, -130], [72, -30]],
      'amérique': [[-56, -130], [72, -30]],
      'asie': [[0, 40], [55, 145]],
      'europe': [[35, -12], [72, 45]],
      'moyen-orient': [[12, 25], [42, 63]],
      'moyen orient': [[12, 25], [42, 63]],
      'océan indien': [[-25, 35], [12, 80]],
      'ocean indien': [[-25, 35], [12, 80]],
      'océanie': [[-50, 110], [0, 180]],
      'oceanie': [[-50, 110], [0, 180]],
    };
    const bounds = CONTINENT_BOUNDS[search];
    if (bounds) {
      mainMap.fitBounds(bounds, { padding: [30, 30], animate: true });
    }
  }
}

function updateActiveFiltersCount() {
  let count = 0;
  if (document.getElementById('filterContinent').value) count++;
  if (document.getElementById('filterCountry').value) count++;
  document.querySelectorAll('.filter-chip.active').forEach(() => count++);
  const badge = document.getElementById('activeFiltersCount');
  if (count > 0) { badge.style.display = ''; badge.textContent = count; }
  else { badge.style.display = 'none'; }
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterContinent').value = '';
  document.getElementById('filterCountry').value = '';
  document.querySelectorAll('.filter-chip.active').forEach(c => c.classList.remove('active'));
  applyFilters();
}

function toggleFilters() {
  document.getElementById('filtersPopup').classList.add('open');
}
function closeFiltersPopup() {
  document.getElementById('filtersPopup').classList.remove('open');
  applyFilters();
}

function getGroupName(title) {
  // Known multi-fiche brand prefixes
  const brandPrefixes = [['Terra ', 'Terra Panamerica'], ['Breathe In Travel', null], ['Abbey Tours', null], ['Aurora Travel', null], ['Balkania Tour', null], ['Easia Travel', null], ['Envie de Maghreb', null], ['Jans Tours', null], ['Phoenix Voyages', null], ['Tanganyika Expeditions', null], ['Tarandro', null], ['Tucaya Travel', null]];
  for (const [prefix, alias] of brandPrefixes) {
    if (title.startsWith(prefix)) return (alias || prefix).trim();
  }
  const seps = [', DMC', ', Réceptif', ', réceptif', ', Votre', ', un '];
  for (const sep of seps) {
    if (title.includes(sep)) return title.split(sep)[0].trim();
  }
  return title.trim();
}

function renderList() {
  const header = document.getElementById('dmcListHeader');
  const list = document.getElementById('dmcList');
  header.textContent = `${filteredDMC.length} DMC / réceptif${filteredDMC.length > 1 ? 's' : ''} trouvé${filteredDMC.length > 1 ? 's' : ''}`;

  if (filteredDMC.length === 0) {
    list.innerHTML = '<div class="no-results"><p>Aucun DMC ne correspond à vos critères.</p><p>Essayez de modifier vos filtres.</p></div>';
    return;
  }

  // Group by base name
  const groups = new Map();
  filteredDMC.forEach(dmc => {
    const g = getGroupName(dmc.title || '');
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(dmc);
  });

  // Sort: sponsored first, then alphabetical
  const sortedGroups = [...groups.entries()].sort((a, b) => {
    const aS = a[1].some(d => d.sponsored) ? 0 : 1;
    const bS = b[1].some(d => d.sponsored) ? 0 : 1;
    if (aS !== bS) return aS - bS;
    return a[0].localeCompare(b[0], 'fr');
  });

  let html = '';
  sortedGroups.forEach(([groupName, dmcs]) => {
    const isSpon = dmcs.some(d => d.sponsored);
    const firstDmc = dmcs[0];
    const imgSrc = firstDmc.image || '';

    if (dmcs.length === 1) {
      // Single fiche — direct click
      const dmc = dmcs[0];
      // Show all proposed destinations
      const allDests = [...new Set([...(dmc.primary_destinations || []), ...(dmc.destinations || [])])];
      const destStr = allDests.join(', ');
      const topTags = [...(dmc.tags?.clientele || []).slice(0, 2), ...(dmc.tags?.prestations || []).slice(0, 2)].map(t => `<span class="dmc-card-tag">${t.label}</span>`).join('');
      const safeUrl = dmc.url.replace(/'/g, "\\'");
      html += `<div class="dmc-card${isSpon ? ' sponsored' : ''}" data-url="${dmc.url}" onclick="selectDMC('${safeUrl}')">
        ${imgSrc ? `<img class="dmc-card-img" src="${imgSrc}" alt="" loading="lazy" onerror="this.style.display='none'">` : '<div class="dmc-card-img"></div>'}
        <div class="dmc-card-info">
          <div class="dmc-card-name">${dmc.title}</div>
          <div class="dmc-card-dest">${destStr}</div>
          <div class="dmc-card-tags">${topTags}</div>
        </div>
      </div>`;
    } else {
      // Multi fiches — grouped with expand
      // Collect ALL unique destinations from all fiches in the group
      const allGroupDests = [...new Set(dmcs.flatMap(d => [...(d.primary_destinations || []), ...(d.destinations || [])]))].sort((a,b) => a.localeCompare(b,'fr'));
      const destStr = allGroupDests.join(', ');
      const gid = 'grp_' + groupName.replace(/\W/g, '_');
      html += `<div class="dmc-group">
        <div class="dmc-group-header${isSpon ? ' sponsored' : ''}" onclick="toggleGroup('${gid}')">
          ${imgSrc ? `<img class="dmc-group-img" src="${imgSrc}" alt="" loading="lazy" onerror="this.style.display='none'">` : '<div class="dmc-group-img"></div>'}
          <div class="dmc-group-info">
            <div class="dmc-group-name">${groupName}</div>
            <div class="dmc-group-meta">${destStr}</div>
          </div>
          <span class="dmc-group-count">${dmcs.length} fiches</span>
        </div>
        <div class="dmc-group-fiches" id="${gid}">`;
      dmcs.sort((a,b) => ((a.primary_destinations||[])[0]||'').localeCompare((b.primary_destinations||[])[0]||'','fr')).forEach(dmc => {
        const pd = (dmc.primary_destinations || []).sort((a,b) => a.localeCompare(b,'fr')).join(', ') || '?';
        const safeUrl = dmc.url.replace(/'/g, "\\'");
        html += `<div class="dmc-group-fiche" onclick="event.stopPropagation();selectDMC('${safeUrl}')">
          <span class="fiche-dest">📍 ${pd}</span>
        </div>`;
      });
      html += `</div></div>`;
    }
  });

  list.innerHTML = html;
}

function toggleGroup(gid) {
  const el = document.getElementById(gid);
  if (el) el.classList.toggle('open');
}

function updateCount() {
  const el = document.getElementById('topbarCount');
  if (el) el.textContent = filteredDMC.length;
}

function initMainMap() {
  mainMap = L.map('mainMap', { zoomControl: true, scrollWheelZoom: true, closePopupOnClick: false, tap: false }).setView([25, 10], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO | © TourMaG.com', maxZoom: 18
  }).addTo(mainMap);
  markerClusterGroup = L.markerClusterGroup({
    maxClusterRadius: 45,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      let size = 'small';
      if (count > 20) size = 'large';
      else if (count > 5) size = 'medium';
      return L.divIcon({
        html: '<div>' + count + '</div>',
        className: 'marker-cluster marker-cluster-' + size,
        iconSize: L.point(36, 36)
      });
    }
  });
  mainMap.addLayer(markerClusterGroup);
  // Desktop only: click on map closes popups
  if (!('ontouchstart' in window)) {
    mainMap.on('click', function() { mainMap.closePopup(); });
  }
}

// Find the closest fiche (with isPrimary somewhere) for an orphan destination point
function findClosestFicheUrl(orphanLat, orphanLng, groupName) {
  // Collect all fiches in this group that have at least one primary destination
  const groupDMCs = allDMC.filter(d => getGroupName(d.title || '') === groupName);
  let bestUrl = null;
  let bestDist = Infinity;
  groupDMCs.forEach(dmc => {
    // Check if this fiche has primary destinations with known coordinates
    const primaries = (dmc.primary_destinations || []);
    if (primaries.length === 0) return;
    primaries.forEach(dest => {
      const coord = GEO[dest.toLowerCase().trim()];
      if (!coord) return;
      const dLat = coord[0] - orphanLat;
      const dLng = coord[1] - orphanLng;
      const dist = dLat * dLat + dLng * dLng; // Squared distance is fine for comparison
      if (dist < bestDist) {
        bestDist = dist;
        bestUrl = dmc.url;
      }
    });
  });
  return bestUrl;
}

function renderMarkers() {
  if (!mainMap) return;
  markerClusterGroup.clearLayers();
  // Remove previously added sponsored markers from map
  markers.forEach(m => { if (m._isSponsored && mainMap.hasLayer(m)) mainMap.removeLayer(m); });
  markers = [];
  const tempMarkers = [];
  // Group markers by lat/lng, dedupe by group name
  const pointMap = new Map();
  filteredDMC.forEach(dmc => {
    const groupName = getGroupName(dmc.title || '');
    (dmc.coordinates || []).forEach(coord => {
      if (coord.lat == null || coord.lng == null) return;
      const key = coord.lat.toFixed(4) + ',' + coord.lng.toFixed(4);
      if (!pointMap.has(key)) pointMap.set(key, { lat: coord.lat, lng: coord.lng, dest: coord.destination, entries: [] });
      const point = pointMap.get(key);
      // One entry per group per point; prefer the fiche whose primary_destinations match this location
      const existing = point.entries.find(e => e.group === groupName);
      if (!existing) {
        point.entries.push({ group: groupName, dmc: dmc, isPrimary: (dmc.primary_destinations || []).some(pd => pd.toLowerCase() === (coord.destination || '').toLowerCase()) });
      } else {
        if (!existing.isPrimary && (dmc.primary_destinations || []).some(pd => pd.toLowerCase() === (coord.destination || '').toLowerCase())) {
          existing.dmc = dmc;
          existing.isPrimary = true;
        }
        // Propagate sponsored + logo from any fiche in the group
        if (dmc.sponsored && !existing.dmc.sponsored) {
          existing.dmc = Object.assign({}, existing.dmc, { sponsored: true, logo_url: dmc.logo_url || existing.dmc.logo_url });
        }
        if (dmc.logo_url && !existing.dmc.logo_url) {
          existing.dmc = Object.assign({}, existing.dmc, { logo_url: dmc.logo_url });
        }
      }
    });
  });
  pointMap.forEach(point => {
    const hasSpon = point.entries.some(e => e.dmc.sponsored);
    // Check if any sponsored DMC has a logo
    const sponWithLogo = point.entries.find(e => e.dmc.sponsored && e.dmc.logo_url);
    let icon;
    if (sponWithLogo) {
      const logo = sponWithLogo.dmc.logo_url;
      const totalEntries = point.entries.length;
      const otherCount = totalEntries - 1;
      const countBadge = otherCount > 0 ? '<div class="marker-count">+' + otherCount + ' autre' + (otherCount > 1 ? 's' : '') + ' DMC</div>' : '';
      icon = L.divIcon({
        className: 'custom-marker sponsored sponsored-logo',
        iconSize: [56, 56],
        iconAnchor: [28, 28],
        html: '<img src="' + logo + '" alt="" onerror="this.parentNode.classList.remove(\'sponsored-logo\');this.remove()"><div class="sponsor-star">★</div>' + countBadge
      });
    } else {
      const size = hasSpon ? [28, 28] : [20, 20];
      const anchor = [size[0]/2, size[1]/2];
      icon = L.divIcon({ className: 'custom-marker' + (hasSpon ? ' sponsored' : ''), iconSize: size, iconAnchor: anchor });
    }
    const marker = L.marker([point.lat, point.lng], { icon, zIndexOffset: hasSpon ? 1000 : 0 });
    let popupHtml;
    if (point.entries.length === 1) {
      const e = point.entries[0];
      const dmc = e.dmc;
      const logoHtml = dmc.logo_url ? '<img class="popup-logo" src="' + dmc.logo_url + '" alt="" onerror="this.outerHTML=this.nextElementSibling.outerHTML"><span style="display:none" class="popup-logo-init">' + (dmc.title||'?').substring(0,2).toUpperCase() + '</span>' : '<div class="popup-logo-init">' + (dmc.title||'?').substring(0,2).toUpperCase() + '</div>';
      if (e.isPrimary) {
        popupHtml = `<div class="popup-inner">
          <div class="popup-header-d"><div class="popup-dest">${point.dest || ''}</div></div>
          <div class="popup-list-d">
            <div class="popup-mini popup-clickable${dmc.sponsored?' sponsored':''}" data-dmc-url="${encodeURIComponent(dmc.url)}" style="cursor:pointer">
              ${logoHtml}
              <span class="popup-name">${dmc.title}</span>
              
            </div>
          </div></div>`;
      } else {
        const fallbackUrl = findClosestFicheUrl(point.lat, point.lng, e.group);
        if (fallbackUrl) {
          popupHtml = `<div class="popup-inner">
            <div class="popup-header-d"><div class="popup-dest">${point.dest || ''}</div></div>
            <div class="popup-list-d">
              <div class="popup-mini popup-clickable${dmc.sponsored?' sponsored':''}" data-dmc-url="${encodeURIComponent(fallbackUrl)}" style="cursor:pointer">
                ${logoHtml}
                <span class="popup-name">${e.group}</span>
              </div>
            </div></div>`;
        } else {
          popupHtml = `<div class="popup-inner">
            <div class="popup-header-d"><div class="popup-dest">${point.dest || ''}</div></div>
            <div class="popup-list-d">
              <div class="popup-mini${dmc.sponsored?' sponsored':''}">
                ${logoHtml}
                <span class="popup-name">${e.group}</span>
              </div>
            </div></div>`;
        }
      }
    } else {
      const useGrid = point.entries.length >= 4;
      popupHtml = `<div class="popup-inner">
        <div class="popup-header-d">
          <div class="popup-dest">${point.dest || ''}</div>
          <div class="popup-count">${point.entries.length} réceptifs disponibles</div>
        </div>
        <div class="popup-list-d${useGrid ? ' popup-grid' : ''}">
        ${point.entries.map(e => {
          const dmc = e.dmc;
          const logoH = dmc.logo_url ? '<img class="popup-logo" src="' + dmc.logo_url + '" alt="" onerror="this.outerHTML=this.nextElementSibling.outerHTML"><span style="display:none" class="popup-logo-init">' + (dmc.title||'?').substring(0,2).toUpperCase() + '</span>' : '<div class="popup-logo-init">' + (dmc.title||'?').substring(0,2).toUpperCase() + '</div>';
          if (e.isPrimary) {
            return '<div class="popup-mini popup-clickable' + (dmc.sponsored?' sponsored':'') + '" data-dmc-url="' + encodeURIComponent(dmc.url) + '" style="cursor:pointer">' + logoH + '<span class="popup-name">' + e.group + '</span></div>';
          } else {
            var fbUrl = findClosestFicheUrl(point.lat, point.lng, e.group);
            if (fbUrl) {
              return '<div class="popup-mini popup-clickable' + (dmc.sponsored?' sponsored':'') + '" data-dmc-url="' + encodeURIComponent(fbUrl) + '" style="cursor:pointer">' + logoH + '<span class="popup-name">' + e.group + '</span></div>';
            }
            return '<div class="popup-mini' + (dmc.sponsored?' sponsored':'') + '">' + logoH + '<span class="popup-name">' + e.group + '</span></div>';
          }
        }).join('')}
        </div></div>`;
    }
    marker.bindPopup(popupHtml, { offset: [0, -4], maxHeight: 450, className: point.entries.length >= 4 ? 'popup-wide-wrap' : '' });
    if (!('ontouchstart' in window)) {
      marker.on('mouseover', function() { if (this._closeTimeout) { clearTimeout(this._closeTimeout); this._closeTimeout = null; } this.openPopup(); });
      marker.on('mouseout', function() { var m = this; m._closeTimeout = setTimeout(function() { m.closePopup(); }, 400); });
      marker.on('popupopen', function() { var m = this; var popup = this.getPopup(); if (popup && popup.getElement()) { var el = popup.getElement(); el.addEventListener('mouseenter', function() { if (m._closeTimeout) { clearTimeout(m._closeTimeout); m._closeTimeout = null; } }); el.addEventListener('mouseleave', function() { m.closePopup(); }); } });
    }
    marker.dmcUrl = point.entries.length === 1 && point.entries[0].isPrimary ? point.entries[0].dmc.url : null;
    tempMarkers.push(marker);
    marker._isSponsored = hasSpon;
  });
  // Sponsored markers go directly on map (always visible), others go in cluster
  const clusterMarkers = tempMarkers.filter(m => !m._isSponsored);
  const sponsoredMarkers = tempMarkers.filter(m => m._isSponsored);
  markerClusterGroup.addLayers(clusterMarkers);
  sponsoredMarkers.forEach(m => m.addTo(mainMap));
  markers = tempMarkers;
}

function initEmbedMap() {
  embedMapInstance = L.map('embedMap', {
    zoomControl: false, dragging: false, scrollWheelZoom: false,
    doubleClickZoom: false, touchZoom: false, keyboard: false, attributionControl: false
  }).setView([30, 10], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 18 }).addTo(embedMapInstance);
  let dotIdx = 0;
  allDMC.forEach(dmc => {
    (dmc.coordinates || []).forEach(coord => {
      if (coord.lat == null || coord.lng == null) return;
      const icon = L.divIcon({
        className: '',
        iconSize: [8, 8],
        iconAnchor: [4, 4],
        html: '<div class="embed-dot-pulse" style="animation-delay:' + (dotIdx % 5) * 0.4 + 's"></div>'
      });
      L.marker([coord.lat, coord.lng], { icon: icon, interactive: false }).addTo(embedMapInstance);
      dotIdx++;
    });
  });

  // Counter animation
  const counterEl = document.getElementById('embedCounterNum');
  if (counterEl) {
    let current = 0;
    const target = 100;
    const step = Math.ceil(target / 45);
    const iv = setInterval(() => {
      current += step;
      if (current >= target) { current = target; clearInterval(iv); }
      counterEl.textContent = current;
    }, 30);
  }

  // Carousel text rotation
  const carouselTexts = [
    { h: '🌍 Carte des DMC / Réceptifs', p: 'Trouvez votre agence réceptive' },
    { h: '🌍 Albanie, Croatie, Japon…', p: 'et bien d\'autres destinations' },
    { h: '🌍 Trouvez votre réceptif', p: 'par destination et spécialité' },
    { h: '🌍 Asie, Afrique, Europe…', p: 'le monde à portée de carte' }
  ];
  let carouselIdx = 0;
  const carouselEl = document.getElementById('embedCarousel');
  if (carouselEl) {
    setInterval(() => {
      carouselEl.style.opacity = '0';
      setTimeout(() => {
        carouselIdx = (carouselIdx + 1) % carouselTexts.length;
        carouselEl.innerHTML = '<h2>' + carouselTexts[carouselIdx].h + '</h2><p>' + carouselTexts[carouselIdx].p + '</p>';
        carouselEl.style.opacity = '1';
      }, 400);
    }, 3500);
  }
}

function selectDMC(url) {
  const dmc = allDMC.find(d => d.url === url);
  if (!dmc) return;
  activeDMC = dmc;

  // Clear previous highlights
  clearHighlights();

  // Highlight dans la liste
  document.querySelectorAll('.dmc-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.dmc-card[data-url="${url}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  // Find all DMCs in the same group
  const groupName = getGroupName(dmc.title || '');
  const groupDMCs = allDMC.filter(d => getGroupName(d.title || '') === groupName);
  const allGroupCoords = new Set();
  groupDMCs.forEach(d => {
    (d.coordinates || []).forEach(c => {
      if (c.lat != null && c.lng != null) allGroupCoords.add(c.lat.toFixed(4) + ',' + c.lng.toFixed(4));
    });
  });

  // Zoom on this specific fiche's primary destinations
  const primaryCoords = [];
  (dmc.primary_destinations || []).forEach(dest => {
    const key = dest.toLowerCase().trim();
    const coord = GEO[key];
    if (coord) primaryCoords.push({ lat: coord[0], lng: coord[1] });
  });

  // Fallback to all coordinates if no primary match
  const zoomCoords = primaryCoords.length > 0 ? primaryCoords : (dmc.coordinates || []).filter(c => c.lat != null && c.lng != null);

  if (zoomCoords.length > 0 && mainMap) {
    if (zoomCoords.length === 1) {
      mainMap.setView([zoomCoords[0].lat, zoomCoords[0].lng], 6, { animate: true });
    } else {
      const bounds = L.latLngBounds(zoomCoords.map(c => [c.lat, c.lng]));
      mainMap.fitBounds(bounds, { padding: [50, 50], maxZoom: 8, animate: true });
    }

    // Highlight all markers belonging to this group (no popup)
    setTimeout(() => {
      markers.forEach(m => {
        const ll = m.getLatLng();
        const mKey = ll.lat.toFixed(4) + ',' + ll.lng.toFixed(4);
        if (allGroupCoords.has(mKey)) {
          const el = m.getElement ? m.getElement() : m._icon;
          if (el) el.classList.add('highlighted');
        }
      });
    }, 400);
  }

  // Remplir le panel
  const panel = document.getElementById('detailPanel');
  const header = document.getElementById('detailHeader');
  const body = document.getElementById('detailBody');

  header.innerHTML = `
    ${dmc.image ? `<img src="${dmc.image}" alt="${dmc.title}" onerror="this.style.display='none'">` : '<div style="height:140px;background:var(--dark)"></div>'}
    <button class="detail-close" onclick="closeDetail()">✕</button>`;

  const isSpon = dmc.sponsored === true;

  let html = `
    <div class="detail-title">${dmc.title}</div>`;

  // Smart destination display
  const cleanDest = arr => (arr||[]).map(d => d.replace(/[\\/""«»]/g, '').replace(/\.{2,}/g, '').trim()).filter(d => d.length > 1 && !/^Date\b/i.test(d));
  const primaryDests = cleanDest(dmc.primary_destinations);
  const allDests = cleanDest(dmc.destinations);
  const primarySet = new Set(primaryDests.map(d => d.toLowerCase().trim()));
  const allDestsSet = new Set(allDests.map(d => d.toLowerCase().trim()));
  const otherDests = allDests.filter(d => !primarySet.has(d.toLowerCase().trim()));
  // Same if every primary is in allDests and every allDest is in primary
  const sameDestinations = allDests.length > 0 && primaryDests.every(d => allDestsSet.has(d.toLowerCase().trim())) && otherDests.length === 0;

  if (sameDestinations) {
    // Identical lists — show ONLY the proposed block, no badges
    html += `<div class="detail-proposed-dests"><div class="detail-proposed-title">Destinations proposées par ce réceptif</div><div class="detail-proposed-list">${allDests.map(d => `<span class="detail-proposed-tag">${d}</span>`).join('')}</div></div>`;
  } else {
    // Show badges for primary
    if (primaryDests.length > 0) {
      html += `<div class="detail-destinations">${primaryDests.map(d => `<span class="detail-dest-badge">${d}</span>`).join('')}</div>`;
    }
    // Show "Autres destinations" if there are extras
    if (otherDests.length > 0) {
      html += `<div class="detail-proposed-dests"><div class="detail-proposed-title">Autres destinations proposées par ce réceptif</div><div class="detail-proposed-list">${otherDests.map(d => `<span class="detail-proposed-tag">${d}</span>`).join('')}</div></div>`;
    }
  }

  html += `<div class="detail-desc">${dmc.description}</div>`;

  if (dmc.date_creation) html += `<div class="detail-date">📅 Créé en ${dmc.date_creation}</div>`;

  html += `<a class="detail-link${isSpon ? ' sponsored' : ''}" href="${dmc.url}" target="_blank" rel="noopener">Contactez ce réceptif →</a>`;

  // Latest news
  var newsArr = dmc.latest_news || [];
  if (newsArr.length > 0) {
    var nw = newsArr[0];
    html += '<div class="detail-news">';
    html += '<div class="dmcnews-brand">DMC NEWS</div>';
    html += '<div class="dmcnews-tabs">';
    html += '<div class="dmcnews-tab active">Dernière actualité</div>';
    if (newsArr.length > 1) {
      html += '<button class="dmcnews-tab" onclick="openAllNews()">Toutes les actualités (' + newsArr.length + ')</button>';
    }
    html += '</div>';
    html += '<div class="dmcnews-content">';
    html += '<a href="' + nw.url + '" target="_blank" class="news-card">';
    if (nw.image) html += '<img src="' + nw.image + '" alt="" class="news-img">';
    html += '<div class="news-card-body">';
    html += '<div class="news-card-title">' + nw.title + '</div>';
    if (nw.date) html += '<div class="news-card-date">' + nw.date + '</div>';
    html += '<div class="news-card-read">Lire l\'article →</div>';
    html += '</div></a>';
    html += '</div></div>';
    window._currentDmcNews = newsArr;
    window._currentDmcTitle = dmc.title;
  }

  // Event encart (IFTM) - only for sponsored DMCs with event data
  if (dmc.event_active && dmc.event) {
    var ev = dmc.event;
    html += '<div class="event-encart">';
    if (ev.image) html += '<img class="event-encart-img" src="' + ev.image + '" alt="" onerror="this.style.display=\'none\'">';
    html += '<div class="event-encart-body">';
    if (ev.title) html += '<div class="event-encart-title">' + ev.title + '</div>';
    if (ev.text) html += '<div class="event-encart-text">' + ev.text + '</div>';
    if (ev.stand) html += '<div class="event-encart-stand">📍 Stand ' + ev.stand + '</div>';
    if (ev.button_text && ev.button_url) html += '<a class="event-encart-btn" href="' + ev.button_url + '" target="_blank">' + ev.button_text + '</a>';
    html += '</div></div>';
  }

  const catConfig = [
    { key: 'clientele', title: 'Clientèle', cssClass: 'clientele' },
    { key: 'prestations', title: 'Prestations', cssClass: 'prestations' },
    { key: 'activites', title: 'Activités / Thématiques', cssClass: 'activites' }
  ];

  catConfig.forEach(({ key, title, cssClass }) => {
    const tags = dmc.tags[key] || [];
    if (tags.length === 0) return;
    html += `<div class="detail-section-title ${cssClass}">${title}</div><div class="detail-pictos">`;
    tags.forEach(t => {
      const pictoUrl = PICTO_BASE + t.id + '.png';
      html += `<div class="detail-picto"><img src="${pictoUrl}" alt="${t.label}" onerror="this.style.display='none'"><span>${t.label}</span></div>`;
    });
    html += `</div>`;
  });

  body.innerHTML = html;
  panel.classList.toggle('sponsored-active', isSpon);
  if (isSpon) {
    header.insertAdjacentHTML('beforeend', '<div style="position:absolute;bottom:10px;right:10px;background:linear-gradient(135deg,#F59E0B,#EF4444);color:#fff;font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:20px;z-index:2;box-shadow:0 2px 8px rgba(245,158,11,.4)">⭐ Sponsorisé</div>');
  }
  panel.classList.add('open');
}

function clearHighlights() {
  document.querySelectorAll('.custom-marker.highlighted').forEach(el => el.classList.remove('highlighted'));
}

function closeDetail() {
  const panel = document.getElementById('detailPanel');
  panel.classList.remove('open');
  panel.classList.remove('sponsored-active');
  clearHighlights();
  document.querySelectorAll('.dmc-card').forEach(c => c.classList.remove('active'));
  activeDMC = null;
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
  try { window.parent.postMessage({ type: 'dmc-map-open' }, '*'); } catch(e) {}
  // Re-show banner each time the map opens
  var slot = document.getElementById('bannerSlot');
  if (slot && slot.querySelector('#bannerContent').innerHTML.trim()) slot.style.display = 'block';
  if (!mainMap) {
    setTimeout(() => { initMainMap(); renderMarkers(); }, 100);
  } else {
    setTimeout(() => mainMap.invalidateSize(), 200);
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
  try { window.parent.postMessage({ type: 'dmc-map-close' }, '*'); } catch(e) {}
  closeDetail();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Delegated click handler for popup DMC links (avoids inline onclick escaping issues)
document.addEventListener('click', function(e) {
  var el = e.target.closest('.popup-clickable');
  if (el && el.dataset.dmcUrl) {
    e.preventDefault();
    e.stopPropagation();
    selectDMC(decodeURIComponent(el.dataset.dmcUrl));
  }
});

// =====================================================================
// ANALYTICS TRACKING
// =====================================================================
const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
const sessionStart = Date.now();
let searchDebounce = null;

const EXCLUDED_UIDS = ['QRAHUQzp2SVLzCnuNgChKJ8WiW12'];

function trackEvent(type, data = {}) {
  try {
    // Ne pas tracker si l'utilisateur est un admin
    if (localStorage.getItem('dmc_admin_notrack') === '1') return;
    db.collection('analytics').add({
      type,
      ...data,
      session_id: sessionId,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      user_agent: navigator.userAgent,
      screen: window.innerWidth + 'x' + window.innerHeight,
      referrer: document.referrer || ''
    });
  } catch(e) { /* silent */ }
}

// Track visit on modal open
const _origOpenModal = openModal;
openModal = function() {
  _origOpenModal();
  trackEvent('visit', { entry: 'modal_open' });
};

// Track DMC view
const _origSelectDMC = selectDMC;
selectDMC = function(url) {
  const dmc = allDMC.find(d => d.url === url);
  trackEvent('view_dmc', {
    dmc_url: url,
    dmc_title: dmc ? dmc.title : '',
    dmc_destinations: dmc ? (dmc.primary_destinations || []).join(', ') : ''
  });
  _origSelectDMC(url);
};

// Track searches (debounced)
const searchInput = document.getElementById('searchInput');
if (searchInput) {
  const _origOninput = searchInput.oninput;
  searchInput.oninput = function(e) {
    if (_origOninput) _origOninput.call(this, e);
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      const q = this.value.trim();
      if (q.length >= 2) {
        trackEvent('search', { query: q, results_count: filteredDMC.length });
      }
    }, 1500);
  };
}

// Track filter usage
const _origApplyFilters = applyFilters;
applyFilters = function() {
  _origApplyFilters();
  const continent = document.getElementById('filterContinent').value;
  const country = document.getElementById('filterCountry').value;
  const activeChips = [];
  document.querySelectorAll('.filter-chip.active').forEach(c => activeChips.push(c.textContent));
  if (continent || country || activeChips.length > 0) {
    trackEvent('filter', {
      continent: continent || '',
      country: country || '',
      tags: activeChips.join(', '),
      results_count: filteredDMC.length
    });
  }
};

// Track clicks to TourMaG external links
document.addEventListener('click', function(e) {
  const link = e.target.closest('a[href*="tourmag.com"]');
  if (link) {
    trackEvent('click_url', { target_url: link.href, dmc_title: activeDMC ? activeDMC.title : '' });
  }
});

// Track session duration on page unload
window.addEventListener('beforeunload', function() {
  const duration = Math.round((Date.now() - sessionStart) / 1000);
  // Use sendBeacon for reliability
  const data = JSON.stringify({
    type: 'session_end',
    session_id: sessionId,
    duration_seconds: duration,
    timestamp: new Date().toISOString()
  });
  navigator.sendBeacon && navigator.sendBeacon(
    `https://firestore.googleapis.com/v1/projects/destimap-e901b/databases/(default)/documents/analytics`,
    '' // sendBeacon with Firestore REST is complex; we use a simpler approach
  );
  // Fallback: sync write (may not always work)
  try {
    if (localStorage.getItem('dmc_admin_notrack') !== '1') {
      db.collection('analytics').add({
        type: 'session_end',
        session_id: sessionId,
        duration_seconds: duration,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  } catch(e) {}
});

// Track initial page load
trackEvent('page_load', { entry: 'embed_view' });

// =====================================================================
// INIT
// =====================================================================
loadData();

// Tell parent iframe the embed height
try {
  var embedEl = document.getElementById('embedContainer');
  if (embedEl) {
    window.parent.postMessage({ type: 'dmc-map-resize', height: embedEl.offsetHeight }, '*');
  }
} catch(e) {}

function openAllNews() {
  var news = window._currentDmcNews || [];
  var title = window._currentDmcTitle || '';
  if (!news.length) return;
  var h = '';
  news.forEach(function(n) {
    h += '<a href="' + n.url + '" target="_blank" class="news-card">';
    if (n.image) h += '<img src="' + n.image + '" alt="" class="news-img">';
    h += '<div class="news-card-body">';
    h += '<div class="news-card-title">' + n.title + '</div>';

    if (n.date) h += '<div class="news-card-date">' + n.date + '</div>';
    if (n.excerpt) h += '<div style="font-size:.72rem;color:var(--text-light);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + n.excerpt + '</div>';
    h += '</div></a>';
  });
  document.getElementById('newsPopupTitle').textContent = title + ' — Actualités (' + news.length + ')';
  document.getElementById('newsPopupScroll').innerHTML = h;
  document.getElementById('newsPopupBg').classList.add('open');
}
function closeAllNews() {
  document.getElementById('newsPopupBg').classList.remove('open');
}
</script>
<div class="news-popup-bg" id="newsPopupBg" onclick="if(event.target===this)closeAllNews()">
  <div class="news-popup">
    <div class="news-popup-header">
      <span id="newsPopupTitle"></span>
      <button class="news-popup-close" onclick="closeAllNews()">✕</button>
    </div>
    <div class="news-popup-scroll" id="newsPopupScroll"></div>
  </div>
</div>
